[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "distant_sunburn"
version = "0.0.1"
description = ""
readme = "README.md"
authors = []

[tool.hatch.build]
sources = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
addopts = "-v -ra --strict-markers"
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::UserWarning",
]
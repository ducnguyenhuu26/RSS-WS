problem: Hopper-v5
model: duc_wm

seed: 0
train_steps: 60000
test_steps: 12000
epochs: 90
batch_size: 1536
eval_batch_size: 4096
learning_rate: 0.001
device: cuda

mujoco_extension:
  variant: all
  test_variant: all
  train_variants: null
  test_variants: null
  num_contexts: 64
  test_num_contexts: 16
  action_policy: smooth_random
  action_smoothing: 0.85
  parallel_workers: 0

duc:
  history_length: 8
  hidden_size: 384
  hidden_layers: 3
  beta_kl: 0.001
  context_weight: 0.08
  control_weight: 0.05
  rollout_weight: 0.08
  rollout_horizon: 10
  reward_weight: 0.0
  action_rank_margin: 0.05
  llm_prior:
    enabled: true
    provider: openai
    model_slug: gpt-4.1-mini
    api_key_env: OPENAI_API_KEY
    max_tokens: 4500
    num_candidates: 3
    cache_enabled: true
    cache_scope: seed
    cache_dir: outputs/llm_prior_cache
    json_path: null

simfutures:
  symbolic_delta_scale: 0.20
  chart_count: 4
  phase_dim: 16
  belief_blend: 0.70
  belief_update_rate: 0.20
  stability_gate_floor: 0.20
  adapter_gate_init: -3.0
  adapter_max_scale: 1.0
  symbolic_var_floor: 0.02
  symbolic_var_ceiling: 25.0
  symbolic_temperature: 2.0
  beta_kl: 0.001
  prior_kl_weight: 0.0005
  prior_path_weight: 0.25
  law_channel_weight: 0.12
  reward_weight: 0.10
  reliability_weight: 0.25
  stability_weight: 0.10
  risk_weight: 0.10
  control_weight: 0.05
  backbone_weight: 0.50
  adapter_safety_weight: 0.25
  adapter_l1_weight: 0.01
  phase_loss_weight: 0.05
  belief_smooth_weight: 0.02
  rollout_weight: 0.08
  rollout_safety_weight: 0.25
  posterior_update_interval: 1
  posterior_update_samples: 8192
  posterior_trust: 0.25
  posterior_temperature: 1.0
  utility_error_weight: 1.0
  utility_reward_gap_weight: 0.25
  utility_law_weight: 0.10

baseline:
  hidden_size: 384
  hidden_layers: 3
  ensemble_size: 7
  context_dim: 10
  context_weight: 0.08

reward:
  hidden_size: 384
  hidden_layers: 3
  epochs: 30
  batch_size: 1536
  learning_rate: 0.001
  seed_offset: 50000

planning:
  enabled: true
  episodes: 5
  max_steps: 400
  horizon: 16
  candidates: 384
  elites: 48
  iterations: 4
  uncertainty_weight: 0.0
  model_bonus_weight: 0.0
  certified_risk_weight: 1.0
  certified_risk_calibration_enabled: true
  certified_risk_delta: 0.10
  certified_risk_samples: 12288
  certified_risk_batch_size: 4096

wake:
  enabled: true
  episodes: 4
  max_steps: 120
  horizon: 12
  candidates: 256
  elites: 32
  iterations: 3
  uncertainty_weight: 0.0
  model_bonus_weight: 0.0
  certified_risk_weight: 0.0
  risk_delta: 0.10
  posterior_trust: 0.15
  posterior_temperature: 1.0

runtime:
  precision: bf16
  preload_to_device: true
  compile: false
  compile_mode: reduce-overhead
  matmul_precision: high
  allow_tf32: true
  cudnn_benchmark: true
  num_threads: 0
  interop_threads: 0

output_dir: outputs/simfutures_hopper_full_adaptive
output_name: null
skip_existing: false
verbose: false

hydra:
  job:
    chdir: false
  run:
    dir: outputs/hydra/${now:%Y-%m-%d}/${now:%H-%M-%S}

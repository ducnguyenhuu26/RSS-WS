problem: Hopper-v5
model: duc_wm

seed: 0
train_steps: 12000
test_steps: 3000
epochs: 60
batch_size: 256
eval_batch_size: 512
learning_rate: 0.001
device: auto

mujoco_extension:
  # Start with the full hidden-mechanism support for a fair first benchmark.
  # For compositional OOD sweeps, override train_variants/test_variants from
  # the CLI. A list means one run collects and concatenates all listed variants.
  variant: all
  test_variant: all
  train_variants: null
  test_variants: null
  num_contexts: 24
  test_num_contexts: 12
  action_policy: smooth_random
  action_smoothing: 0.85
  parallel_workers: 4

duc:
  history_length: 5
  hidden_size: 256
  hidden_layers: 2
  beta_kl: 0.001
  context_weight: 0.0
  residual_weight: 0.0001
  control_weight: 0.05
  rollout_weight: 0.1
  rollout_horizon: 10
  orth_weight: 0.0001
  sparse_weight: 0.00001
  unknown_weight: 0.001
  teacher_force_context: false
  llm_prior:
    enabled: false
    provider: openai
    model_slug: gpt-4.1-mini
    api_key_env: OPENAI_API_KEY
    max_tokens: 3000
    json_path: null

baseline:
  hidden_size: 256
  hidden_layers: 2
  ensemble_size: 5
  context_dim: 10

reward:
  hidden_size: 256
  hidden_layers: 2
  epochs: 20
  batch_size: 256
  learning_rate: 0.001

planning:
  enabled: true
  episodes: 3
  max_steps: 200
  horizon: 15
  candidates: 256
  elites: 32
  iterations: 3
  uncertainty_weight: 0.05

runtime:
  precision: fp32
  preload_to_device: false
  compile: false
  compile_mode: reduce-overhead
  matmul_precision: high
  allow_tf32: true
  cudnn_benchmark: true
  num_threads: 0
  interop_threads: 0

output_dir: outputs/duc_wm_workshop
output_name: null
skip_existing: false
verbose: false

hydra:
  job:
    chdir: false
  run:
    dir: outputs/hydra/${now:%Y-%m-%d}/${now:%H-%M-%S}

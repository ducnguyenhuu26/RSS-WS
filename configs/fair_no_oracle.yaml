problem: Hopper-v5
model: duc_wm

seed: 0
train_steps: 30000
test_steps: 8000
epochs: 60
batch_size: 1024
eval_batch_size: 4096
learning_rate: 0.001
device: cuda

mujoco_extension:
  variant: all
  test_variant: all
  train_variants: null
  test_variants: null
  num_contexts: 48
  test_num_contexts: 16
  action_policy: smooth_random
  action_smoothing: 0.85
  parallel_workers: 0

duc:
  history_length: 8
  hidden_size: 256
  hidden_layers: 2
  beta_kl: 0.001
  context_weight: 0.0
  control_weight: 0.05
  rollout_weight: 0.05
  rollout_horizon: 10
  llm_prior:
    enabled: false
    provider: openai
    model_slug: gpt-4.1-mini
    api_key_env: OPENAI_API_KEY
    max_tokens: 3000
    json_path: null


simfutures:
  symbolic_delta_scale: 0.20
  chart_count: 4
  phase_dim: 16
  beta_kl: 0.001
  prior_kl_weight: 0.0005
  prior_path_weight: 0.25
  law_channel_weight: 0.10
  reward_weight: 0.10
  reliability_weight: 0.20
  control_weight: 0.05
  phase_loss_weight: 0.05
  rollout_weight: 0.05
  posterior_update_interval: 1
  posterior_update_samples: 4096
  posterior_trust: 0.25
  posterior_temperature: 1.0
  utility_error_weight: 1.0
  utility_reward_gap_weight: 0.25
  utility_law_weight: 0.10
baseline:
  hidden_size: 256
  hidden_layers: 2
  ensemble_size: 5
  context_dim: 10
  context_weight: 0.0

reward:
  hidden_size: 256
  hidden_layers: 2
  epochs: 20
  batch_size: 1024
  learning_rate: 0.001

planning:
  enabled: false
  episodes: 3
  max_steps: 200
  horizon: 15
  candidates: 256
  elites: 32
  iterations: 3
  uncertainty_weight: 0.05

runtime:
  precision: bf16
  preload_to_device: true
  compile: false
  compile_mode: reduce-overhead
  matmul_precision: high
  allow_tf32: true
  cudnn_benchmark: true
  num_threads: 0
  interop_threads: 0

output_dir: outputs/simfutures_fair_no_oracle
output_name: null
skip_existing: false
verbose: false

hydra:
  job:
    chdir: false
  run:
    dir: outputs/hydra/${now:%Y-%m-%d}/${now:%H-%M-%S}

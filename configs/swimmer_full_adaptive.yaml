problem: Swimmer-v5
model: duc_wm

seed: 0
train_steps: 40000
test_steps: 10000
epochs: 80
batch_size: 1024
eval_batch_size: 4096
learning_rate: 0.001
device: cuda

mujoco_extension:
  variant: all
  test_variant: all
  train_variants: null
  test_variants: null
  num_contexts: 64
  test_num_contexts: 16
  action_policy: smooth_random
  action_smoothing: 0.85
  # 0 uses all logical CPU cores inside one job. If running several models in
  # parallel, override this to a fixed per-job value such as 8 or 16.
  parallel_workers: 0

duc:
  history_length: 8
  hidden_size: 384
  hidden_layers: 3
  beta_kl: 0.001
  context_weight: 0.08
  control_weight: 0.05
  rollout_weight: 0.08
  rollout_horizon: 10
  # Set false for no-label DUC: keep validating law priors from observed
  # transition deltas, but do not peek at ground-truth context labels.
  # Main protocol uses DUC-core: mechanistic prior projection, context
  # inference, residual repair, trust-region regularization, and fair MPC.
  # Reward-wake replay remains available as an ablation but is disabled here
  # because it hurt Swimmer control in the current implementation.
  reward_weight: 0.0
  action_rank_margin: 0.05
  # Learned symbolic revalidation is optional ablation, not the main protocol.
  # Keep false for benchmark runs: DUC learns to infer alpha from history,
  # while context supervision still trains the inferred alpha.
  llm_prior:
    enabled: true
    provider: openai
    model_slug: gpt-4.1-mini
    api_key_env: OPENAI_API_KEY
    max_tokens: 3000
    json_path: null

simfutures:
  symbolic_delta_scale: 0.20
  beta_kl: 0.001
  prior_kl_weight: 0.0005
  law_channel_weight: 0.12
  reward_weight: 0.10
  reliability_weight: 0.25
  control_weight: 0.05
  rollout_weight: 0.08
  posterior_update_interval: 1
  posterior_update_samples: 8192
  posterior_trust: 0.25
  posterior_temperature: 1.0
  utility_error_weight: 1.0
  utility_reward_gap_weight: 0.25
  utility_law_weight: 0.10

baseline:
  hidden_size: 384
  hidden_layers: 3
  ensemble_size: 7
  context_dim: 10
  context_weight: 0.08

reward:
  hidden_size: 384
  hidden_layers: 3
  epochs: 30
  batch_size: 1024
  learning_rate: 0.001
  # Keep the planning reward surrogate identical across methods. Without this
  # reseed, each model's dynamics training consumes a different amount of RNG
  # before reward-model initialization.
  seed_offset: 50000

planning:
  enabled: true
  episodes: 3
  max_steps: 250
  horizon: 20
  candidates: 512
  elites: 64
  iterations: 4
  # Primary fair protocol: do not penalize PETS for ensemble variance while
  # single-model baselines expose a non-equivalent uncertainty estimate.
  uncertainty_weight: 0.0
  # SimFutures uses its own reliability critic as part of the method. Baselines
  # do not emit a planning bonus, so this override has no effect on them.
  model_bonus_weight: 0.20

runtime:
  precision: bf16
  preload_to_device: true
  compile: false
  compile_mode: reduce-overhead
  matmul_precision: high
  allow_tf32: true
  cudnn_benchmark: true
  num_threads: 0
  interop_threads: 0

output_dir: outputs/simfutures_swimmer_full_adaptive
output_name: null
skip_existing: false
verbose: false

hydra:
  job:
    chdir: false
  run:
    dir: outputs/hydra/${now:%Y-%m-%d}/${now:%H-%M-%S}

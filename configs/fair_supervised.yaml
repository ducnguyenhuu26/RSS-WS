problem: Hopper-v5
model: duc_wm

seed: 0
train_steps: 30000
test_steps: 8000
epochs: 60
batch_size: 1024
eval_batch_size: 4096
learning_rate: 0.001
device: cuda

mujoco_extension:
  variant: all
  test_variant: all
  train_variants: null
  test_variants: null
  num_contexts: 48
  test_num_contexts: 16
  action_policy: smooth_random
  action_smoothing: 0.85
  parallel_workers: 0

duc:
  history_length: 8
  hidden_size: 256
  hidden_layers: 2
  beta_kl: 0.001
  context_weight: 0.08
  residual_weight: 0.00005
  control_weight: 0.05
  rollout_weight: 0.05
  rollout_horizon: 10
  orth_weight: 0.00005
  sparse_weight: 0.000005
  unknown_weight: 0.0005
  prior_beta_init: 1.0
  trust_region_weight: 0.2
  trust_region_delta_min: 0.15
  trust_region_delta_range: 1.0
  prior_beta_weight: 0.0005
  residual_warmup_fraction: 0.25
  context_adapter_scale: 1.0
  safe_prior_mixture: false
  safe_prior_init: 0.25
  safe_prior_min: 0.0
  safe_prior_max: 1.0
  prior_validation: true
  prior_validation_min_gate: 0.08
  prior_validation_temperature: 0.08
  prior_validation_max_samples: 4096
  prior_validation_beta_min: 0.05
  prior_validation_beta_max: 8.0
  reward_sensitivity_scale: 4.0
  reward_sensitivity_max: 6.0
  teacher_force_context: false
  llm_prior:
    enabled: false
    provider: openai
    model_slug: gpt-4.1-mini
    api_key_env: OPENAI_API_KEY
    max_tokens: 3000
    json_path: null

baseline:
  hidden_size: 256
  hidden_layers: 2
  ensemble_size: 5
  context_dim: 10
  context_weight: 0.08

reward:
  hidden_size: 256
  hidden_layers: 2
  epochs: 20
  batch_size: 1024
  learning_rate: 0.001

planning:
  enabled: false
  episodes: 3
  max_steps: 200
  horizon: 15
  candidates: 256
  elites: 32
  iterations: 3
  uncertainty_weight: 0.05

runtime:
  precision: bf16
  preload_to_device: true
  compile: false
  compile_mode: reduce-overhead
  matmul_precision: high
  allow_tf32: true
  cudnn_benchmark: true
  num_threads: 0
  interop_threads: 0

output_dir: outputs/duc_wm_fair_supervised
output_name: null
skip_existing: false
verbose: false

hydra:
  job:
    chdir: false
  run:
    dir: outputs/hydra/${now:%Y-%m-%d}/${now:%H-%M-%S}

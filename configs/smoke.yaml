problem: InvertedPendulum-v5
model: duc_wm

seed: 0
train_steps: 8
test_steps: 4
epochs: 1
batch_size: 2
eval_batch_size: 4
learning_rate: 0.001
device: auto

mujoco_extension:
  variant: wind+sticky
  test_variant: wind+sticky
  train_variants: null
  test_variants: null
  num_contexts: 2
  test_num_contexts: 2
  action_policy: random
  action_smoothing: 0.0
  parallel_workers: 1

duc:
  history_length: 2
  hidden_size: 32
  hidden_layers: 1
  beta_kl: 0.001
  context_weight: 1.0
  control_weight: 0.01
  rollout_weight: 0.01
  rollout_horizon: 2
  llm_prior:
    enabled: true
    provider: openai
    model_slug: gpt-4.1-mini
    api_key_env: OPENAI_API_KEY
    max_tokens: 1000
    json_path: null

simfutures:
  symbolic_delta_scale: 0.20
  chart_count: 4
  phase_dim: 16
  belief_blend: 0.70
  belief_update_rate: 0.20
  stability_gate_floor: 0.20
  beta_kl: 0.001
  prior_kl_weight: 0.0005
  prior_path_weight: 0.25
  law_channel_weight: 0.10
  reward_weight: 0.10
  reliability_weight: 0.20
  stability_weight: 0.10
  risk_weight: 0.10
  control_weight: 0.01
  phase_loss_weight: 0.05
  belief_smooth_weight: 0.02
  rollout_weight: 0.01
  posterior_update_interval: 1
  posterior_update_samples: 128
  posterior_trust: 0.25
  posterior_temperature: 1.0
  utility_error_weight: 1.0
  utility_reward_gap_weight: 0.25
  utility_law_weight: 0.10

baseline:
  hidden_size: 32
  hidden_layers: 1
  ensemble_size: 2
  context_dim: 4

reward:
  hidden_size: 32
  hidden_layers: 1
  epochs: 1
  batch_size: 2
  learning_rate: 0.001

planning:
  enabled: false
  episodes: 1
  max_steps: 5
  horizon: 2
  candidates: 8
  elites: 2
  iterations: 1
  uncertainty_weight: 0.0
  model_bonus_weight: 0.15
  certified_risk_weight: 0.0
  certified_risk_calibration_enabled: true
  certified_risk_delta: 0.10
  certified_risk_samples: 8192
  certified_risk_batch_size: 4096

runtime:
  precision: fp32
  preload_to_device: false
  compile: false
  compile_mode: reduce-overhead
  matmul_precision: high
  allow_tf32: true
  cudnn_benchmark: true
  num_threads: 0
  interop_threads: 0

output_dir: outputs/simfutures_smoke
output_name: null
skip_existing: false
verbose: false

hydra:
  job:
    chdir: false
  run:
    dir: outputs/hydra/${now:%Y-%m-%d}/${now:%H-%M-%S}

problem: InvertedPendulum-v5
probllem: null
model: ours

seed: 0
train_steps: 8
test_steps: 4
epochs: 1
batch_size: 2
learning_rate: 0.001
residual_l2_weight: 0.001
hidden_sizes: [128, 128]
device: auto

llm:
  provider: openai
  model_slug: gpt-4o-mini
  sample_count: 2
  dt: auto

discretization:
  state_bins: 21
  action_bins: 11

rollout:
  horizons: [1, 3]
  num_rollouts: 2
  action_policy: zero
  stop_on_done: false

planning:
  enabled: true
  num_episodes: 1
  max_episode_steps: 3
  horizon: 2
  random_candidates: 4
  cem_candidates: 4
  cem_elites: 2
  cem_iterations: 1

output_dir: outputs
output_name: null
verbose: false

hydra:
  job:
    chdir: false
  run:
    dir: outputs/hydra/${now:%Y-%m-%d}/${now:%H-%M-%S}

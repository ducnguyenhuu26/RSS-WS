problem: InvertedPendulum-v5
model: duc_wm

seed: 0
train_steps: 8
test_steps: 4
epochs: 1
batch_size: 2
eval_batch_size: 4
learning_rate: 0.001
device: auto

mujoco_extension:
  variant: wind+sticky
  test_variant: wind+sticky
  num_contexts: 2
  test_num_contexts: 2
  action_policy: random
  action_smoothing: 0.0

duc:
  history_length: 2
  hidden_size: 32
  hidden_layers: 1
  beta_kl: 0.001
  context_weight: 1.0
  control_weight: 0.0
  orth_weight: 0.0
  sparse_weight: 0.0
  teacher_force_context: true
  llm_prior:
    json_path: null

output_dir: outputs/duc_wm_smoke
output_name: null
skip_existing: false
verbose: false

hydra:
  job:
    chdir: false
  run:
    dir: outputs/hydra/${now:%Y-%m-%d}/${now:%H-%M-%S}

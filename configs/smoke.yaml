problem: InvertedPendulum-v5
model: answer

seed: 0
train_steps: 8
test_steps: 4
epochs: 1
batch_size: 2
learning_rate: 0.001
residual_l2_weight: 0.001
hidden_sizes: [128, 128]
device: auto

ode:
  steps: 2

gate:
  initial_logit: -3.0
  temperature: 2.0

symbolic:
  initial_law_logit: -4.0
  l1_weight: 0.001
  unknown_confidence_threshold: 0.001
  base_delta_precision: 1.0

probabilistic:
  use_nll_loss: true

llm:
  provider: openai
  model_slug: gpt-4o-mini
  sample_count: 2
  dt: auto

discretization:
  state_bins: 21
  action_bins: 11

rollout:
  horizons: [1, 3]
  num_rollouts: 2
  action_policy: zero
  stop_on_done: false

planning:
  enabled: true
  num_episodes: 1
  max_episode_steps: 3
  horizon: 2
  cem_candidates: 4
  cem_elites: 2
  cem_iterations: 1
  state_ood_weight: 0.05
  action_ood_weight: 0.01
  disagreement_weight: 0.10
  ensemble_variance_weight: 0.10
  ood_z_clip: 3.0

island_search:
  candidates_per_niche: 1
  generations: 1
  island_size: 2
  elite_per_island: 1
  migration_interval: 1
  migrants_per_island: 1
  max_laws_per_program: 2
  validation_sample_count: 4

pets:
  ensemble_size: 2
  bootstrap: true

diagnostics:
  symbolic_baselines: false

output_dir: outputs
output_name: null
skip_existing: false
verbose: false

hydra:
  job:
    chdir: false
  run:
    dir: outputs/hydra/${now:%Y-%m-%d}/${now:%H-%M-%S}

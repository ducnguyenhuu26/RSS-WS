problem: InvertedPendulum-v5
model: duc_wm

seed: 0
train_steps: 8
test_steps: 4
epochs: 1
batch_size: 2
eval_batch_size: 4
learning_rate: 0.001
device: auto

mujoco_extension:
  variant: wind+sticky
  test_variant: wind+sticky
  train_variants: null
  test_variants: null
  num_contexts: 2
  test_num_contexts: 2
  action_policy: random
  action_smoothing: 0.0
  parallel_workers: 1

duc:
  history_length: 2
  hidden_size: 32
  hidden_layers: 1
  beta_kl: 0.001
  context_weight: 1.0
  residual_weight: 0.0001
  control_weight: 0.01
  rollout_weight: 0.01
  rollout_horizon: 2
  orth_weight: 0.0
  sparse_weight: 0.0
  unknown_weight: 0.001
  prior_beta_init: 1.0
  trust_region_weight: 0.2
  trust_region_delta_min: 0.15
  trust_region_delta_range: 1.0
  prior_beta_weight: 0.0005
  residual_warmup_fraction: 0.25
  context_adapter_scale: 1.0
  prior_validation: true
  prior_validation_min_gate: 0.08
  prior_validation_temperature: 0.08
  prior_validation_max_samples: 512
  prior_validation_beta_min: 0.05
  prior_validation_beta_max: 8.0
  reward_sensitivity_scale: 4.0
  reward_sensitivity_max: 6.0
  teacher_force_context: true
  llm_prior:
    enabled: true
    provider: openai
    model_slug: gpt-4.1-mini
    api_key_env: OPENAI_API_KEY
    max_tokens: 1000
    json_path: null

baseline:
  hidden_size: 32
  hidden_layers: 1
  ensemble_size: 2
  context_dim: 4

reward:
  hidden_size: 32
  hidden_layers: 1
  epochs: 1
  batch_size: 2
  learning_rate: 0.001

planning:
  enabled: false
  episodes: 1
  max_steps: 5
  horizon: 2
  candidates: 8
  elites: 2
  iterations: 1
  uncertainty_weight: 0.0

runtime:
  precision: fp32
  preload_to_device: false
  compile: false
  compile_mode: reduce-overhead
  matmul_precision: high
  allow_tf32: true
  cudnn_benchmark: true
  num_threads: 0
  interop_threads: 0

output_dir: outputs/duc_wm_smoke
output_name: null
skip_existing: false
verbose: false

hydra:
  job:
    chdir: false
  run:
    dir: outputs/hydra/${now:%Y-%m-%d}/${now:%H-%M-%S}

problem: Hopper-v5
model: duc_wm

seed: 0
train_steps: 100000
test_steps: 20000
epochs: 100
batch_size: 2048
eval_batch_size: 8192
learning_rate: 0.001
device: cuda

mujoco_extension:
  variant: all
  test_variant: all
  train_variants: null
  test_variants: null
  num_contexts: 128
  test_num_contexts: 32
  action_policy: smooth_random
  action_smoothing: 0.85
  # Set to 0 to use all logical CPU cores. Use 16-32 on shared machines.
  parallel_workers: 0

duc:
  history_length: 8
  hidden_size: 512
  hidden_layers: 3
  beta_kl: 0.001
  context_weight: 0.08
  control_weight: 0.05
  rollout_weight: 0.05
  rollout_horizon: 10
  llm_prior:
    enabled: true
    provider: openai
    model_slug: gpt-4.1-mini
    api_key_env: OPENAI_API_KEY
    max_tokens: 3000
    json_path: null


simfutures:
  symbolic_delta_scale: 0.20
  chart_count: 4
  phase_dim: 16
  belief_blend: 0.70
  belief_update_rate: 0.20
  stability_gate_floor: 0.20
  beta_kl: 0.001
  prior_kl_weight: 0.0005
  prior_path_weight: 0.25
  law_channel_weight: 0.10
  reward_weight: 0.10
  reliability_weight: 0.20
  stability_weight: 0.10
  control_weight: 0.05
  phase_loss_weight: 0.05
  belief_smooth_weight: 0.02
  rollout_weight: 0.05
  posterior_update_interval: 1
  posterior_update_samples: 4096
  posterior_trust: 0.25
  posterior_temperature: 1.0
  utility_error_weight: 1.0
  utility_reward_gap_weight: 0.25
  utility_law_weight: 0.10
baseline:
  hidden_size: 512
  hidden_layers: 3
  ensemble_size: 7
  context_dim: 16

reward:
  hidden_size: 512
  hidden_layers: 3
  epochs: 30
  batch_size: 2048
  learning_rate: 0.001

planning:
  enabled: true
  episodes: 5
  max_steps: 250
  horizon: 20
  candidates: 1024
  elites: 128
  iterations: 4
  uncertainty_weight: 0.05

runtime:
  # BF16 is the preferred fast/stable mode on H100/A100/Ada. Use fp16 only if
  # BF16 is unavailable. Override to fp32 for exact debugging.
  precision: bf16
  preload_to_device: true
  compile: false
  compile_mode: max-autotune
  matmul_precision: high
  allow_tf32: true
  cudnn_benchmark: true
  # Leave 0 to let PyTorch choose. Pin these on busy multi-tenant machines.
  num_threads: 0
  interop_threads: 0

output_dir: outputs/simfutures_workshop_big
output_name: null
skip_existing: false
verbose: false

hydra:
  job:
    chdir: false
  run:
    dir: outputs/hydra/${now:%Y-%m-%d}/${now:%H-%M-%S}

problem: Hopper-v5
model: duc_wm

seed: 0
train_steps: 100000
test_steps: 20000
epochs: 100
batch_size: 2048
eval_batch_size: 8192
learning_rate: 0.001
device: cuda

mujoco_extension:
  variant: all
  test_variant: all
  train_variants: null
  test_variants: null
  num_contexts: 128
  test_num_contexts: 32
  action_policy: smooth_random
  action_smoothing: 0.85
  # Set to 0 to use all logical CPU cores. Use 16-32 on shared machines.
  parallel_workers: 0

duc:
  history_length: 8
  hidden_size: 512
  hidden_layers: 3
  beta_kl: 0.001
  context_weight: 0.0
  residual_weight: 0.0001
  control_weight: 0.05
  rollout_weight: 0.05
  rollout_horizon: 10
  orth_weight: 0.0001
  sparse_weight: 0.00001
  unknown_weight: 0.001
  teacher_force_context: false
  llm_prior:
    enabled: false
    provider: openai
    model_slug: gpt-4.1-mini
    api_key_env: OPENAI_API_KEY
    max_tokens: 3000
    json_path: null

baseline:
  hidden_size: 512
  hidden_layers: 3
  ensemble_size: 7
  context_dim: 16

runtime:
  # BF16 is the preferred fast/stable mode on H100/A100/Ada. Use fp16 only if
  # BF16 is unavailable. Override to fp32 for exact debugging.
  precision: bf16
  preload_to_device: true
  compile: false
  compile_mode: max-autotune
  matmul_precision: high
  allow_tf32: true
  cudnn_benchmark: true
  # Leave 0 to let PyTorch choose. Pin these on busy multi-tenant machines.
  num_threads: 0
  interop_threads: 0

output_dir: outputs/duc_wm_workshop_big
output_name: null
skip_existing: false
verbose: false

hydra:
  job:
    chdir: false
  run:
    dir: outputs/hydra/${now:%Y-%m-%d}/${now:%H-%M-%S}

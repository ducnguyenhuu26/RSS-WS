problem: Hopper-v5
model: ours_new

seed: 0
train_steps: 10000
test_steps: 2000
epochs: 50
batch_size: 256
learning_rate: 0.001
residual_l2_weight: 0.001
hidden_sizes: [256, 256]
device: auto

llm:
  provider: openai
  model_slug: gpt-4o-mini
  sample_count: 32
  dt: auto

discretization:
  state_bins: 21
  action_bins: 11

rollout:
  horizons: []
  num_rollouts: 20
  action_policy: zero
  stop_on_done: false

planning:
  enabled: true
  num_episodes: 1
  max_episode_steps: 200
  horizon: 5
  random_candidates: 64
  cem_candidates: 64
  cem_elites: 8
  cem_iterations: 2

island_search:
  candidates_per_niche: 2
  generations: 2
  island_size: 6
  elite_per_island: 2
  migration_interval: 1
  migrants_per_island: 1
  max_laws_per_program: 5
  validation_sample_count: 1024

pets:
  ensemble_size: 5
  bootstrap: true

diagnostics:
  symbolic_baselines: false

output_dir: outputs
output_name: null
skip_existing: false
verbose: false

hydra:
  job:
    chdir: false
  run:
    dir: outputs/hydra/${now:%Y-%m-%d}/${now:%H-%M-%S}

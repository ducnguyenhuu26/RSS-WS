problem: Hopper-v5
model: duc_wm

seed: 0
train_steps: 1000
test_steps: 1000
epochs: 240
batch_size: 256
eval_batch_size: 512
learning_rate: 0.001
device: auto

mujoco_extension:
  variant: all
  test_variant: all
  train_variants: null
  test_variants: null
  num_contexts: 8
  test_num_contexts: 4
  action_policy: smooth_random
  action_smoothing: 0.85
  parallel_workers: 1

duc:
  history_length: 5
  hidden_size: 256
  hidden_layers: 2
  beta_kl: 0.001
  # Main experiments should not rely on teacher-forced context labels. Keep
  # context_weight=0 for latent inference; set it >0 for supervised attribution
  # debugging on virtual contexts.
  context_weight: 0.08
  control_weight: 0.05
  rollout_weight: 0.1
  rollout_horizon: 10
  llm_prior:
    # The prompt is built per environment and stored in the output JSON for
    # traceability. For reproducible runs, either keep enabled=false and use
    # deterministic fallback templates, or set json_path to a saved LLM JSON.
    # For prior generation runs, set enabled=true.
    enabled: true
    provider: openai
    model_slug: gpt-4.1-mini
    api_key_env: OPENAI_API_KEY
    max_tokens: 3000
    json_path: null

simfutures:
  symbolic_delta_scale: 0.20
  chart_count: 4
  phase_dim: 16
  belief_blend: 0.70
  belief_update_rate: 0.20
  stability_gate_floor: 0.20
  beta_kl: 0.001
  prior_kl_weight: 0.0005
  prior_path_weight: 0.25
  law_channel_weight: 0.12
  reward_weight: 0.10
  reliability_weight: 0.25
  stability_weight: 0.10
  risk_weight: 0.10
  control_weight: 0.05
  phase_loss_weight: 0.05
  belief_smooth_weight: 0.02
  rollout_weight: 0.08
  posterior_update_interval: 1
  posterior_update_samples: 4096
  posterior_trust: 0.25
  posterior_temperature: 1.0
  utility_error_weight: 1.0
  utility_reward_gap_weight: 0.25
  utility_law_weight: 0.10

baseline:
  # Shared-capacity baseline settings. PETS uses ensemble_size; CaDM uses
  # context_dim. Both inherit hidden_size/hidden_layers from DUC unless
  # overridden here.
  hidden_size: 256
  hidden_layers: 2
  ensemble_size: 5
  context_dim: 10

reward:
  hidden_size: 256
  hidden_layers: 2
  epochs: 20
  batch_size: 256
  learning_rate: 0.001

planning:
  enabled: true
  episodes: 1
  max_steps: 200
  horizon: 10
  candidates: 48
  elites: 6
  iterations: 2
  uncertainty_weight: 0.05
  model_bonus_weight: 0.20
  certified_risk_weight: 0.0
  certified_risk_calibration_enabled: true
  certified_risk_delta: 0.10
  certified_risk_samples: 8192
  certified_risk_batch_size: 4096

runtime:
  precision: fp32
  preload_to_device: false
  compile: false
  compile_mode: max-autotune
  matmul_precision: high
  allow_tf32: true
  cudnn_benchmark: true
  num_threads: 0
  interop_threads: 0

output_dir: outputs/simfutures
output_name: null
skip_existing: false
verbose: false

hydra:
  job:
    chdir: false
  run:
    dir: outputs/hydra/${now:%Y-%m-%d}/${now:%H-%M-%S}

problem: Hopper-v5
model: duc_wm

seed: 0
train_steps: 1000
test_steps: 1000
epochs: 240
batch_size: 256
eval_batch_size: 512
learning_rate: 0.001
device: auto

mujoco_extension:
  variant: all
  test_variant: all
  train_variants: null
  test_variants: null
  num_contexts: 8
  test_num_contexts: 4
  action_policy: smooth_random
  action_smoothing: 0.85
  parallel_workers: 1

duc:
  history_length: 5
  hidden_size: 256
  hidden_layers: 2
  beta_kl: 0.001
  # Main experiments should not rely on teacher-forced context labels. Keep
  # context_weight=0 for latent inference; set it >0 for supervised attribution
  # debugging on virtual contexts.
  context_weight: 0.05
  residual_weight: 0.00005
  control_weight: 0.05
  rollout_weight: 0.1
  rollout_horizon: 10
  orth_weight: 0.00005
  sparse_weight: 0.000005
  unknown_weight: 0.0005
  prior_beta_init: 1.0
  trust_region_weight: 0.2
  trust_region_delta_min: 0.15
  trust_region_delta_range: 1.0
  prior_beta_weight: 0.0005
  residual_warmup_fraction: 0.25
  prior_validation: true
  prior_validation_min_gate: 0.02
  prior_validation_temperature: 0.15
  prior_validation_max_samples: 4096
  prior_validation_beta_min: 0.05
  prior_validation_beta_max: 5.0
  teacher_force_context: false
  llm_prior:
    # The prompt is built per environment and stored in the output JSON for
    # traceability. For reproducible runs, either keep enabled=false and use
    # deterministic fallback templates, or set json_path to a saved LLM JSON.
    # For prior generation runs, set enabled=true.
    enabled: true
    provider: openai
    model_slug: gpt-4.1-mini
    api_key_env: OPENAI_API_KEY
    max_tokens: 3000
    json_path: null

baseline:
  # Shared-capacity baseline settings. PETS uses ensemble_size; CaDM uses
  # context_dim. Both inherit hidden_size/hidden_layers from DUC unless
  # overridden here.
  hidden_size: 256
  hidden_layers: 2
  ensemble_size: 5
  context_dim: 10

reward:
  hidden_size: 256
  hidden_layers: 2
  epochs: 20
  batch_size: 256
  learning_rate: 0.001

planning:
  enabled: true
  episodes: 1
  max_steps: 200
  horizon: 10
  candidates: 48
  elites: 6
  iterations: 2
  uncertainty_weight: 0.05

runtime:
  precision: fp32
  preload_to_device: false
  compile: false
  compile_mode: max-autotune
  matmul_precision: high
  allow_tf32: true
  cudnn_benchmark: true
  num_threads: 0
  interop_threads: 0

output_dir: outputs/duc_wm
output_name: null
skip_existing: false
verbose: false

hydra:
  job:
    chdir: false
  run:
    dir: outputs/hydra/${now:%Y-%m-%d}/${now:%H-%M-%S}

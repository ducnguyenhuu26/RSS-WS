problem: Hopper-v5
model: duc_wm

seed: 0
train_steps: 10000
test_steps: 2000
epochs: 50
batch_size: 256
eval_batch_size: 512
learning_rate: 0.001
device: auto

mujoco_extension:
  variant: all
  test_variant: all
  num_contexts: 16
  test_num_contexts: 8
  action_policy: smooth_random
  action_smoothing: 0.85

duc:
  history_length: 4
  hidden_size: 256
  hidden_layers: 2
  beta_kl: 0.001
  context_weight: 1.0
  control_weight: 0.05
  rollout_weight: 0.1
  rollout_horizon: 5
  orth_weight: 0.0001
  sparse_weight: 0.00001
  teacher_force_context: true
  llm_prior:
    # The prompt is built per environment and stored in the output JSON for
    # traceability. For reproducible runs, either keep enabled=false and use
    # deterministic fallback templates, or set json_path to a saved LLM JSON.
    # For prior generation runs, set enabled=true.
    enabled: false
    provider: openai
    model_slug: gpt-4.1-mini
    api_key_env: OPENAI_API_KEY
    max_tokens: 3000
    json_path: null

output_dir: outputs/duc_wm
output_name: null
skip_existing: false
verbose: false

hydra:
  job:
    chdir: false
  run:
    dir: outputs/hydra/${now:%Y-%m-%d}/${now:%H-%M-%S}
